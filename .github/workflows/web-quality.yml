name: Web Quality

on:
  pull_request:
    paths:
      - "web/**"
      - "rust/**"
      - ".github/workflows/web-quality.yml"
  push:
    branches:
      - "main"
    paths:
      - "web/**"
      - "rust/**"
      - ".github/workflows/web-quality.yml"
  workflow_dispatch:

concurrency:
  group: web-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Install dependencies
        run: npm --prefix web ci

      - name: Run lint
        run: npm --prefix web run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      REQUIRE_REAL_WASM: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Install dependencies
        run: npm --prefix web ci

      - name: Build wasm package for tests
        run: npm --prefix web run build:wasm

      - name: Run unit tests
        run: npm --prefix web run test

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "web/package-lock.json"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Install dependencies
        run: npm --prefix web ci

      - name: Run build
        run: npm --prefix web run build
